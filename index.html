<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TransAlumnos</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<h1>🚐 TransAlumnos</h1>

<!-- INICIO -->
<div id="pantallaInicio" class="container">
<h2>📊 Panel de Control</h2>

<div class="card">
<p>Total alumnos: <b id="totalAlumnos">0</b></p>
<p>Pagaron: <b id="totalPagaron">0</b></p>
<p>Pendientes: <b id="totalPendientes">0</b></p>
</div>
</div>

<!-- ALUMNOS -->
<div id="pantallaAlumnos" style="display:none" class="container">

<h2>Agregar Alumno</h2>

<input id="nombre" placeholder="Nombre del alumno">
<input id="direccion" placeholder="Dirección">
<input id="telefono" placeholder="Teléfono">

<button onclick="agregarAlumno()">Guardar</button>

<h2>Lista de alumnos</h2>
<ul id="lista"></ul>

</div>

<!-- PAGOS -->
<div id="pantallaPagos" style="display:none" class="container">
<h2>💰 Control de Pagos</h2>
<ul id="listaPagos"></ul>
</div>

<!-- RUTA -->
<div id="pantallaRuta" style="display:none" class="container">

<h2>🚐 Ruta de Viaje</h2>

<button onclick="iniciarRuta()">🗺 Iniciar recorrido</button>

<ul id="listaRuta"></ul>

</div>

<!-- GPS -->
<div id="pantallaGPS" style="display:none" class="container">

<h2>📍 Ubicación en tiempo real</h2>

<p id="ubicacion">Esperando ubicación...</p>

<button onclick="abrirEnMapa()">📍 Abrir en Google Maps</button>

<iframe id="mapa" width="100%" height="300"></iframe>

</div>

<!-- MENU -->
<div class="menu">

<button onclick="mostrar('pantallaInicio')">🏠</button>
<button onclick="mostrar('pantallaAlumnos')">👦</button>
<button onclick="mostrar('pantallaRuta')">🚐</button>
<button onclick="mostrar('pantallaPagos')">💰</button>
<button onclick="mostrar('pantallaGPS')">📍</button>

</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script src="app.js"></script>

</body>
</html>
