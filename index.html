<!DOCTYPE html>
<html>
<head>
<title>Ubicación en vivo</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 🗺 LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
margin:0;
font-family: Arial;
}

#map{
height:100vh;
width:100%;
}
</style>

</head>

<body>

<h3 style="text-align:center;">🚐 Transporte en tiempo real</h3>
<div id="map"></div>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBCd1wAUZo2HVUT-1-YuXgMukHlQP8I0Xo",
  authDomain: "transalumnos-7841c.firebaseapp.com",
  databaseURL: "https://transalumnos-7841c-default-rtdb.firebaseio.com",
  projectId: "transalumnos-7841c",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🗺 CREAR MAPA
let map = L.map('map').setView([-23.13, -64.32], 15)

// 🗺 CAPA (mapa base)
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: 'Map data © OpenStreetMap'
}).addTo(map)

// 🚐 MARCADOR
let marcador = null

// 🔄 ESCUCHAR UBICACIÓN
db.ref("ubicacion").on("value", (data)=>{

let u = data.val()

if(!u) return

let lat = u.lat
let lon = u.lon

// SI NO EXISTE → CREAR
if(!marcador){
marcador = L.marker([lat, lon]).addTo(map)
} else {
// SI EXISTE → MOVER
marcador.setLatLng([lat, lon])
}

// CENTRAR MAPA
map.setView([lat, lon], 16)

})

</script>

</body>
</html>
