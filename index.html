<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>TransAlumnos</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2196F3">

<link rel="stylesheet" href="style.css">

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
}

.app {
  height: 100vh;
}

#mapa, #mapaPadres, #mapaSeleccion {
  height: 100vh;
  width: 100%;
}

.panel-chofer {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 1000;
}

.panel-chofer button {
  margin: 5px;
  padding: 10px;
}
</style>

</head>

<body>

<div class="app">

<h1 style="text-align:center;">ЁЯЪР TransAlumnos</h1>

<!-- ЁЯФе MODO -->
<div id="pantallaModo">
  <h2>Elegir modo</h2>

  <button onclick="modoChofer()">ЁЯЪР Chofer</button>
  <button onclick="modoPadres()">ЁЯСитАНЁЯСйтАНЁЯСз Padres</button>
</div>

<!-- ЁЯСж ALUMNOS -->
<div id="pantallaAlumnos" style="display:none">

  <h2>Alumnos</h2>

  <input id="nombre" placeholder="Nombre">
  <input id="direccion" placeholder="Direcci├│n">
  <input id="telefono" placeholder="Tel├йfono">

  <br><br>

  <!-- ЁЯФе BOTON NUEVO -->
  <button onclick="abrirMapaSeleccion()">ЁЯУН Elegir ubicaci├│n en mapa</button>

  <button onclick="agregarAlumno()">Guardar</button>

  <p id="ubicacionElegida" style="font-size:12px;"></p>

  <ul id="lista"></ul>

  <button onclick="mostrar('pantallaRuta')">ЁЯЫг Ir a Ruta</button>
  <button onclick="mostrar('pantallaGPS')">ЁЯУб Ir al GPS</button>

</div>

<!-- ЁЯЧ║ SELECCIONAR UBICACION -->
<div id="pantallaMapaSeleccion" style="display:none">

  <div class="panel-chofer">
    <button onclick="guardarUbicacion()">тЬЕ Confirmar</button>
    <button onclick="mostrar('pantallaAlumnos')">тЭМ Cancelar</button>
  </div>

  <div id="mapaSeleccion"></div>

</div>

<!-- ЁЯЫг RUTA -->
<div id="pantallaRuta" style="display:none">

  <h2>Ruta</h2>

  <ul id="listaRuta"></ul>

  <button onclick="comenzarRuta()">ЁЯЪР Comenzar Ruta</button>

  <button onclick="mostrar('pantallaAlumnos')">ЁЯСж Alumnos</button>
  <button onclick="mostrar('pantallaGPS')">ЁЯУб GPS</button>

</div>

<!-- ЁЯУб GPS CHOFER -->
<div id="pantallaGPS" style="display:none">

  <div class="panel-chofer">
    <button onclick="mostrar('pantallaAlumnos')">ЁЯСж</button>
    <button onclick="mostrar('pantallaRuta')">ЁЯЫг</button>
    <button onclick="volverModo()">ЁЯФЩ</button>
  </div>

  <div id="mapa"></div>

</div>

<!-- ЁЯСитАНЁЯСйтАНЁЯСз PADRES -->
<div id="pantallaPadres" style="display:none">
  <div id="mapaPadres"></div>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
