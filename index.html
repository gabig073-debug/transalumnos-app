<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<!-- 🔥 CLAVE PARA PANTALLA COMPLETA -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>TransAlumnos</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#2196F3">

<!-- 🔥 MODO APP -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="apple-touch-icon" href="icono.png">

<link rel="stylesheet" href="style.css">

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

</head>

<body>

<div class="app">

<h1>🚐 TransAlumnos</h1>

<div id="pantallaInicio" class="container">
<h2>📊 Dashboard</h2>
<p>Total alumnos: <span id="totalAlumnos">0</span></p>
<p>Pagaron: <span id="totalPagaron">0</span></p>
<p>Pendientes: <span id="totalPendientes">0</span></p>
</div>

<div id="pantallaAlumnos" style="display:none" class="container">
<h2>Agregar Alumno</h2>

<input id="nombre" placeholder="Nombre">
<input id="direccion" placeholder="Dirección">
<input id="telefono" placeholder="Teléfono">

<button onclick="agregarAlumno()">Guardar</button>

<h2>Lista</h2>
<ul id="lista"></ul>
</div>

<div id="pantallaPagos" style="display:none" class="container">
<h2>Pagos</h2>
<ul id="listaPagos"></ul>
</div>

<div id="pantallaRuta" style="display:none" class="container">
<h2>Ruta</h2>
<button onclick="iniciarRuta()">🗺 Iniciar recorrido</button>
<ul id="listaRuta"></ul>
</div>

<div id="pantallaGPS" style="display:none" class="container">
<h2>GPS en vivo</h2>
<p id="ubicacion">Esperando ubicación...</p>
<iframe id="mapa" width="100%" height="300"></iframe>
<button onclick="abrirEnMapa()">Abrir en mapa</button>
</div>

<div id="pantallaPadres" style="display:none" class="container">
<h2>Seguimiento en vivo</h2>
<p id="ubicacionPadres">Cargando ubicación...</p>
<iframe id="mapaPadres" width="100%" height="300"></iframe>
</div>

<div class="menu">
<button onclick="mostrar('pantallaInicio')">🏠</button>
<button onclick="mostrar('pantallaAlumnos')">👦</button>
<button onclick="mostrar('pantallaRuta')">🚐</button>
<button onclick="mostrar('pantallaPagos')">💰</button>
<button onclick="mostrar('pantallaGPS')">📡</button>
<button onclick="mostrar('pantallaPadres')">👨‍👩‍👧</button>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
