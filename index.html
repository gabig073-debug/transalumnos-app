<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>TransAlumnos</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2196F3">
<link rel="apple-touch-icon" href="icono.png">

<link rel="stylesheet" href="style.css">

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- 🗺 LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>

<body>

<div class="app">

<h1>🚐 TransAlumnos</h1>

<!-- 🔥 MODO -->
<div id="pantallaModo" class="container">
  <h2>Elegir modo</h2>

  <button onclick="modoChofer()">🚐 Soy Chofer</button>
  <button onclick="modoPadres()">👨‍👩‍👧 Soy Padre</button>
</div>

<!-- 🏠 INICIO -->
<div id="pantallaInicio" class="container" style="display:none">
  <h2>📊 Dashboard</h2>
  <p>Total alumnos: <span id="totalAlumnos">0</span></p>
</div>

<!-- 👦 ALUMNOS -->
<div id="pantallaAlumnos" style="display:none" class="container">
  <h2>Agregar Alumno</h2>

  <input id="nombre" placeholder="Nombre">
  <input id="direccion" placeholder="Dirección">
  <input id="telefono" placeholder="Teléfono">

  <button onclick="agregarAlumno()">Guardar</button>

  <h2>Lista</h2>
  <ul id="lista"></ul>
</div>

<!-- 🚐 RUTA -->
<div id="pantallaRuta" style="display:none" class="container">
  <h2>Ruta</h2>
  <button onclick="iniciarRuta()">🗺 Iniciar recorrido</button>
  <ul id="listaRuta"></ul>
</div>

<!-- 📡 GPS CHOFER -->
<div id="pantallaGPS" style="display:none" class="container">
  <h2>GPS en vivo</h2>
  <p id="ubicacion">Esperando ubicación...</p>

  <div id="mapa" style="height:300px; border-radius:10px;"></div>

</div>

<!-- 👨‍👩‍👧 PADRES -->
<div id="pantallaPadres" style="display:none" class="container">
  <h2>Seguimiento en vivo</h2>

  <div id="mapaPadres" style="height:300px; border-radius:10px;"></div>
</div>

<!-- 🔻 MENÚ -->
<div class="menu" id="menu" style="display:none">
  <button onclick="mostrar('pantallaInicio')">🏠</button>
  <button onclick="mostrar('pantallaAlumnos')">👦</button>
  <button onclick="mostrar('pantallaRuta')">🚐</button>
  <button onclick="mostrar('pantallaGPS')">📡</button>
  <button onclick="mostrar('pantallaPadres')">👨‍👩‍👧</button>
  <button onclick="volverModo()">🔄</button>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
