<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TransAlumnos</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🚐 TransAlumnos</h1>

<div id="pantallaInicio" class="container">
<h2>📊 Panel de Control</h2>

<div class="card">
<p>Total alumnos: <b id="totalAlumnos">0</b></p>
<p>Pagaron: <b id="totalPagaron">0</b></p>
<p>Pendientes: <b id="totalPendientes">0</b></p>
</div>

</div>

  
<div id="pantallaAlumnos" style="display:none">
<h2>Agregar Alumno</h2>

<input id="nombre" placeholder="Nombre del alumno">
<input id="direccion" placeholder="Dirección">
<input id="telefono" placeholder="Teléfono">

<button onclick="agregarAlumno()">Guardar</button>

<h2>Lista de alumnos</h2>
<ul id="lista"></ul>
</div>

<div id="pantallaPagos" style="display:none" class="container">
<h2>💰 Control de Pagos</h2>
<ul id="listaPagos"></ul>
</div>

<div id="pantallaRuta" style="display:none" class="container">
<h2>🚐 Ruta de Viaje</h2>
<ul id="listaRuta"></ul>
</div>

<div class="menu">

<button onclick="mostrar('pantallaInicio')">🏠 Inicio</button>
<button onclick="mostrar('pantallaAlumnos')">👦 Alumnos</button>
<button onclick="mostrar('pantallaPagos')">💰 Pagos</button>
<button onclick="mostrar('pantallaRuta')">🚐 Ruta</button>
<button>⚙</button>
</div>

<script src="app.js"></script>

</body>
</html>
